<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>测试上传</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; }
        input, button { margin: 10px 0; padding: 8px; }
        pre { background: #f5f5f5; padding: 15px; border-radius: 5px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>📤 测试账单上传接口</h2>
    
    <input type="file" id="fileInput" accept="image/*">
    <br>
    <button onclick="upload()">上传并识别</button>
    
    <h3>返回结果：</h3>
    <pre id="result">等待上传...</pre>

    <script>
    async function upload() {
        const fileInput = document.getElementById('fileInput');
        const resultDiv = document.getElementById('result');
        
        if (!fileInput.files[0]) {
            resultDiv.textContent = '请先选择一张图片';
            return;
        }
        
        resultDiv.textContent = '识别中...';
        
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        
        try {
            const response = await fetch('http://127.0.0.1:5000/api/upload', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            resultDiv.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
            resultDiv.textContent = '错误：' + error.message;
        }
    }
    </script>
</body>
</html>
